services:
  portainer-templates:
    build: .
    container_name: portainer-templates
    user: 0:0 # run as root nel container
    ports:
      - 8099:80
    volumes:
      - ./templates:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped
    healthcheck:
      test: [CMD, wget, --no-verbose, --tries=1, --spider, http://127.0.0.1/templates.json]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  default:
    name: horizon_network
    external: true
