services:
  tugtainer:
    image: ghcr.io/quenary/tugtainer:${TUGTAINER_IMAGE_VERSION:-latest}
    container_name: tugtainer
    hostname: tugtainer
    restart: unless-stopped
    networks:
      - horizon_network
    ports:
      - ${TUGTAINER_HTTP_PORT:-9412}:80
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - tugtainer_data:/tugtainer
    environment:
      TZ: Europe/Rome
      ENABLE_PUBLIC_API: true
    env_file:
      - path: ./.env
        required: false
    healthcheck:
      test: [CMD, curl, -f, http://localhost:80/]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  tugtainer_data:
    name: tugtainer_data
