services:
  myspeed:
    image: germannewsmaker/myspeed:latest
    container_name: myspeed
    restart: unless-stopped
    networks:
      - horizon_network
    ports:
      - 5216:5216
    volumes:
      - myspeed_data:/myspeed/data
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Europe/Rome}
    healthcheck:
      test: [CMD, wget, --no-verbose, --tries=1, --spider, http://localhost:5216/]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - com.centurylinklabs.watchtower.enable=true

volumes:
  myspeed_data:
    name: myspeed_data
