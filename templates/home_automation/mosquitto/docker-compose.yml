services:
  mqtt:
    image: eclipse-mosquitto
    container_name: mqtt
    hostname: mqtt
    restart: unless-stopped
    networks:
      - horizon_network
    ports:
      - 1883:1883
      - 9001:9001 # WebSocket port (optional)
    volumes:
      - /Volume1/public/config/mosquitto/config:/mosquitto/config
      - /Volume1/public/config/mosquitto/data:/mosquitto/data
      - /Volume1/public/config/mosquitto/log:/mosquitto/log
      - /etc/localtime:/etc/localtime:ro
    # environment:
    #   <<: *env
    healthcheck:
      test: [CMD-SHELL, nc -z localhost 1883 || exit 1]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - com.centurylinklabs.watchtower.monitor-only=true
