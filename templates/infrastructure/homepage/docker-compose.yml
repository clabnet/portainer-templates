services:
  # Homepage - Dashboard
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    hostname: homepage
    restart: unless-stopped
    networks:
      - horizon_network
    ports:
      - ${HOMEPAGE_HTTP_PORT:-3005}:3000
    volumes:
      - /Volume1/public/config/homepage:/app/config
      - /Volume1/public/config/homepage/.env:/app/config/.env:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=${HOMEPAGE_ALLOWED_HOSTS:-192.168.1.2:3005}
    labels:
      - com.centurylinklabs.watchtower.enable=true
