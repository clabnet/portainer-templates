#
# WARNING: To install Immich, follow our guide: https://immich.app/docs/install/docker-compose
#
# Make sure to use the docker-compose.yml of the current release:
#
# https://github.com/immich-app/immich/releases/latest/download/docker-compose.yml
#
# The compose file on main may not be compatible with the latest release.

name: immich

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    environment:
      - IMMICH_SERVER_URL=${IMMICH_SERVER_URL}
      - IMMICH_WEB_URL=${IMMICH_WEB_URL}
      - IMMICH_EXTERNAL_DOMAIN=${IMMICH_EXTERNAL_DOMAIN}
      - IMMICH_CONFIG_FILE=/config/config.json
    volumes:
      - immich-uploads:/data
      - /Volume1/media:/media
      - /Volume1/public/config/immich:/config
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    networks:
      - horizon_network
    ports:
      - "${IMMICH_HTTP_PORT:-2283}:2283"
    depends_on:
      - redis
      - database
    healthcheck:
      disable: false
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  immich-machine-learning:
    container_name: immich_machine_learning
    # For hardware acceleration, add one of -[armnn, cuda, rocm, openvino, rknn] to the image tag.
    # Example tag: ${IMMICH_VERSION:-release}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
    # extends: # uncomment this section for hardware acceleration - see https://immich.app/docs/features/ml-hardware-acceleration
    #   file: hwaccel.ml.yml
    #   service: cpu # set to one of [armnn, cuda, rocm, openvino, openvino-wsl, rknn] for accelerated inference - use the `-wsl` version for WSL2 where applicable
    volumes:
      - immich-model-cache:/cache
    restart: unless-stopped
    networks:
      - horizon_network
    healthcheck:
      disable: false
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:8-bookworm@sha256:fea8b3e67b15729d4bb70589eb03367bab9ad1ee89c876f54327fc7c6e618571
    volumes:
      - immich-redis-data:/data
    healthcheck:
      test: redis-cli ping || exit 1
    restart: unless-stopped
    networks:
      - horizon_network

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: "--data-checksums"
      # Uncomment the DB_STORAGE_TYPE: 'HDD' var if your database isn't stored on SSDs
      DB_STORAGE_TYPE: "HDD"
    volumes:
      - immich-database:/var/lib/postgresql/data
    shm_size: 128mb
    restart: unless-stopped
    networks:
      - horizon_network

volumes:
  # Media uploads - most important data
  immich-uploads:
    name: immich_uploads

  # Database - critical data
  immich-database:
    name: immich_database

  # ML model cache - can be recreated but saves time
  immich-model-cache:
    name: immich_model_cache

  # Redis data - sessions and cache
  immich-redis-data:
    name: immich_redis_data
