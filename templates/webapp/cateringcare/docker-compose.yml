services:
  backend:
    image: ghcr.io/clabnet/catering-care-backend:latest
    container_name: catering-care-backend
    restart: unless-stopped
    networks:
      - horizon_network
    ports:
      - ${BACKEND_PORT}:${BACKEND_PORT}
    volumes:
      - /Volume1/public/config/cateringcare/data:/app/data
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    labels:
      - com.centurylinklabs.watchtower.enable=true

  frontend:
    image: ghcr.io/clabnet/catering-care-frontend:latest
    container_name: catering-care-frontend
    restart: unless-stopped
    networks:
      - horizon_network
    ports:
      - ${FRONTEND_PORT}:80
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    depends_on:
      - backend
    labels:
      - com.centurylinklabs.watchtower.enable=true
