services:
  backend:
    image: ghcr.io/clabnet/wendy-backend:latest
    container_name: wendy-backend
    restart: unless-stopped
    networks:
      - horizon_network
    ports:
      - 5454:5050
    volumes:
      - /Volume1/media/upload/wendy:/app/upload
    environment:
      - DISABLE_AUTH=false
    env_file:
      - .env
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  frontend:
    image: ghcr.io/clabnet/wendy-frontend:latest
    container_name: wendy-frontend
    restart: unless-stopped
    networks:
      - horizon_network
    ports:
      - 3454:80
    environment:
      - VITE_API_BASE_URL=http://host.docker.internal:5454
    env_file:
      - .env
    depends_on:
      - backend
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
